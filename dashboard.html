<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head><body><div class="container">
  <!-- Barra de Busca -->
  <div class="search-container">
    <input type="text" id="global-search" placeholder="Buscar clientes, tarefas, contatos...">
  </div>

  <!-- Botão de Tema -->
  <button id="theme-toggle" class="secondary-btn" style="width: auto; padding: 5px 10px; margin-bottom: 10px;">🌙</button>
  
  <!-- Seção do Avatar -->
  <div class="avatar-profile">
    <div id="current-avatar" class="avatar-icon">👤</div>
    <h2 id="welcome-message">Olá, <span id="user-name">...</span> 👋</h2>
    <button id="toggle-avatar-btn" class="secondary-btn">Alterar Avatar</button>
  </div>

  <!-- Seleção de Avatar (Oculta por padrão) -->
  <div id="avatar-selection" class="details-box" style="display: none;">
    <p>Escolha um novo avatar:</p>
    <div class="avatar-grid">
      <button class="avatar-option" data-id="avatar_01">😎</button>
      <button class="avatar-option" data-id="avatar_02">🚀</button>
      <button class="avatar-option" data-id="avatar_03">💡</button>
      <button class="avatar-option" data-id="avatar_04">🎨</button>
    </div>
  </div>

  <div class="info-grid">
    <p><strong>Plano:</strong> <span id="user-plan">...</span></p>
    <p><strong>Conta criada em:</strong> <span id="account-created">...</span></p>
    <p><strong>Último acesso:</strong> <span id="last-access">...</span></p>
  </div>
  <div class="menu-actions">
    <a href="#">Notificações</a>
    <a href="#">Configurações</a>
  </div>
  <button id="logout-btn" style="margin-top: 15px;">Sair</button>
</div>
<script src="firebase-config.js"></script>
<script src="database.js"></script>
<script src="dashboard.js"></script>
<script src="theme.js"></script>
<script src="search.js"></script>
</body></html>
