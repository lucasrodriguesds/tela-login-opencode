<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cadastro - Meu Projeto</title>
  <meta name="description" content="Página de cadastro do sistema.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head><body><div class="container"><h2>Cadastro</h2><form><div class="input-group"><label for="login">Login</label><input type="text" id="login" required><span class="error-message" id="login-error"></span></div>
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required>
          <span class="error-message" id="email-error"></span>
        </div>
        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required>
          <div class="password-strength-container">
            <div id="password-strength-bar" class="password-strength-bar"></div>
          </div>
          <span class="error-message" id="password-error"></span>
        </div><div class="options"><label><input type="checkbox"> Salvar login</label><label><input type="checkbox"> Salvar senha</label></div><button type="submit" id="submit-btn"><span class="spinner" id="btn-spinner"></span><span id="btn-text">Cadastrar</span></button></form><p class="footer-link">Já tem conta? <a href="index.html">Login</a></p></div><script src="script.js"></script></body></html>
